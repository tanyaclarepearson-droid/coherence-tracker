<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coherence</title>

<style>
body {
  font-family: -apple-system, sans-serif;
  margin: 0;
  background: radial-gradient(circle,#eef6ff,#ffffff);
  transition: background 0.8s ease;
}

.screen {
  display:none;
  padding:20px;
  text-align:center;
}

.screen.active {
  display:block;
}

h1 {
  font-size:26px;
  margin-bottom:10px;
}

p {
  opacity:0.7;
}

button {
  padding:14px;
  width:80%;
  margin-top:20px;
  border:none;
  border-radius:16px;
  background:#4a90e2;
  color:white;
  font-size:16px;
}

.card {
  background:rgba(255,255,255,0.75);
  border-radius:20px;
  padding:16px;
  margin:16px;
}

.pulse {
  width:120px;
  height:120px;
  margin:20px auto;
  border-radius:50%;
  background:radial-gradient(circle,#6fcf97,#4caf7d);
  animation:pulse 2.5s infinite;
  opacity:0.7;
}

@keyframes pulse {
  0% { transform:scale(1); opacity:0.7; }
  50% { transform:scale(1.2); opacity:1; }
  100% { transform:scale(1); opacity:0.7; }
}

.low { background:radial-gradient(circle,#ff6b6b,#ff8e8e); }
.mid { background:radial-gradient(circle,#4a90e2,#7fb6ff); }
.high { background:radial-gradient(circle,#6fcf97,#8ee3b5); }

.metric {
  font-size:32px;
  font-weight:600;
}

</style>
</head>

<body>

<!-- ONBOARDING -->
<div id="on1" class="screen active">
<h1>Teaching is constant decision-making</h1>
<p>But we rarely see what actually works.</p>
<button onclick="next('on2')">Next</button>
</div>

<div id="on2" class="screen">
<h1>Learning depends on coherence</h1>
<p>When energy is aligned, learning strengthens.</p>
<button onclick="next('on3')">Next</button>
</div>

<div id="on3" class="screen">
<h1>Capture → See → Improve</h1>
<p>In 20 seconds, you’ll begin to see patterns.</p>
<button onclick="startApp()">Start</button>
</div>

<!-- CAPTURE -->
<div id="capture" class="screen">

<div class="card">
<h3>Energy</h3>
<button onclick="setEnergy('Pulled')">Pulled</button>
<button onclick="setEnergy('Mixed')">Mixed</button>
<button onclick="setEnergy('Held')">Held</button>
</div>

<div class="card">
<h3>Focus</h3>
<button onclick="setFocus(2)">Low</button>
<button onclick="setFocus(3)">Medium</button>
<button onclick="setFocus(5)">High</button>
</div>

<button onclick="save()">Save</button>

</div>

<!-- DASHBOARD -->
<div id="dashboard" class="screen">

<div class="pulse" id="pulse"></div>

<div class="card">
<div class="metric" id="avg"></div>
<p>Average Focus</p>
</div>

<div class="card">
<p id="insight"></p>
</div>

<button onclick="next('capture')">New Entry</button>

</div>

<script>

let data={};

function next(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function startApp(){
  next("capture");
}

function setEnergy(val){
  data.energy=val;
}

function setFocus(val){
  data.focus=val;
}

function save(){
  let entries=JSON.parse(localStorage.getItem("entries")||"[]");
  entries.push(data);
  localStorage.setItem("entries",JSON.stringify(entries));
  loadDashboard();
}

function loadDashboard(){
  next("dashboard");

  let entries=JSON.parse(localStorage.getItem("entries")||"[]");

  let focus=entries.map(e=>e.focus||0);
  let avg=(focus.reduce((a,b)=>a+b,0)/focus.length||0).toFixed(1);

  document.getElementById("avg").innerText=avg;

  // pulse color
  let pulse=document.getElementById("pulse");
  pulse.className="pulse";

  if(avg < 3) pulse.classList.add("low");
  else if(avg < 4) pulse.classList.add("mid");
  else pulse.classList.add("high");

  // insight
  let insight = avg < 3
    ? "Focus is breaking. Begin with structure or reset."
    : avg < 4
    ? "Focus is building. Add interaction earlier."
    : "Coherence is strong. Maintain your approach.";

  document.getElementById("insight").innerText=insight;
}

</script>

</body>
</html>
