<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coherence Works</title>

<style>
body {
  font-family: -apple-system, sans-serif;
  margin: 0;
  background: linear-gradient(180deg,#eef6f9,#ffffff);
}

.header {
  text-align: center;
  padding: 20px 10px 10px;
}

.logo {
  font-size: 26px;
  font-weight: 500;
  color: #3f5f73;
}

.container {
  padding: 16px;
}

.card {
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 16px;
  margin-bottom: 14px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

h3 {
  margin-bottom: 10px;
  color: #3f5f73;
}

button, select {
  width: 100%;
  padding: 14px;
  margin: 6px 0;
  border-radius: 14px;
  border: none;
  background: #e8f2f7;
  transition: all 0.2s ease;
  font-size: 16px;
}

button.selected {
  background: linear-gradient(135deg,#4a90e2,#6fb3ff);
  color: white;
  transform: scale(1.02);
}

button.multi.selected {
  background: linear-gradient(135deg,#6fcf97,#8ee3b5);
}

.primary {
  background: linear-gradient(135deg,#4a90e2,#6fb3ff);
  color: white;
}

.metric {
  font-size: 30px;
  font-weight: 600;
  color: #3f5f73;
}

.sub {
  opacity: 0.6;
}

canvas {
  width: 100%;
  height: 150px;
}

.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  background: white;
}

.nav button {
  flex: 1;
  border-radius: 0;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">Coherence Works</div>
</div>

<div class="container">

<!-- CAPTURE -->
<div id="capture">

<div class="card">
<h3>Energy</h3>
<button onclick="selectSingle(this,'energy','Pulled')">Pulled</button>
<button onclick="selectSingle(this,'energy','Mixed')">Mixed</button>
<button onclick="selectSingle(this,'energy','Held')">Held</button>
</div>

<div class="card">
<h3>Focus</h3>
<button onclick="selectSingle(this,'focus',2)">Low</button>
<button onclick="selectSingle(this,'focus',3)">Medium</button>
<button onclick="selectSingle(this,'focus',5)">High</button>
</div>

<div class="card">
<h3>Engagement</h3>
<button onclick="selectSingle(this,'engagement',2)">Low</button>
<button onclick="selectSingle(this,'engagement',3)">Medium</button>
<button onclick="selectSingle(this,'engagement',5)">High</button>
</div>

<div class="card">
<h3>Moves (max 2)</h3>
<button class="multi" onclick="toggleMulti(this,'moves','Language')">Language</button>
<button class="multi" onclick="toggleMulti(this,'moves','Breathing')">Breathing</button>
<button class="multi" onclick="toggleMulti(this,'moves','Clarity')">Clarity</button>
<button class="multi" onclick="toggleMulti(this,'moves','Interaction')">Interaction</button>
</div>

<div class="card">
<h3>Block</h3>
<select onchange="data.block=this.value">
<option>Morning</option>
<option>After Recess</option>
<option>After Lunch</option>
</select>
</div>

<div class="card">
<h3>What helped?</h3>
<button onclick="selectSingle(this,'insight','Clarity')">Clarity</button>
<button onclick="selectSingle(this,'insight','Structure')">Structure</button>
<button onclick="selectSingle(this,'insight','Regulation')">Regulation</button>
<button onclick="selectSingle(this,'insight','Interaction')">Interaction</button>
</div>

<button class="primary" onclick="saveEntry()">Save</button>

</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">

<div class="card">
<div class="metric" id="focusAvg"></div>
<div class="sub">Focus</div>
</div>

<div class="card">
<div class="metric" id="engageAvg"></div>
<div class="sub">Engagement</div>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>Top Moves</h3>
<div id="moves"></div>
</div>

<div class="card">
<h3>Insight</h3>
<div id="insight"></div>
</div>

</div>

</div>

<div class="nav">
<button onclick="show('capture')">Capture</button>
<button onclick="show('dashboard')">Dashboard</button>
</div>

<script>

let data={};

function show(screen){
  document.getElementById("capture").style.display = screen==="capture"?"block":"none";
  document.getElementById("dashboard").style.display = screen==="dashboard"?"block":"none";
  if(screen==="dashboard") loadDashboard();
}

function selectSingle(btn,key,val){
  let parent=btn.parentNode;
  parent.querySelectorAll("button").forEach(b=>b.classList.remove("selected"));
  btn.classList.add("selected");
  data[key]=val;
}

function toggleMulti(btn,key,val){
  if(!data[key]) data[key]=[];

  if(data[key].includes(val)){
    data[key]=data[key].filter(v=>v!==val);
    btn.classList.remove("selected");
  } else {
    if(data[key].length<2){
      data[key].push(val);
      btn.classList.add("selected");
    }
  }
}

function saveEntry(){
  let entries=JSON.parse(localStorage.getItem("entries")||"[]");
  entries.push({...data});
  localStorage.setItem("entries",JSON.stringify(entries));
  data={};
  alert("Saved ✔️");
}

function loadDashboard(){
  let entries=JSON.parse(localStorage.getItem("entries")||"[]");

  let focus=entries.map(e=>e.focus||0);
  let engage=entries.map(e=>e.engagement||0);

  let avgF=(focus.reduce((a,b)=>a+b,0)/focus.length||0).toFixed(1);
  let avgE=(engage.reduce((a,b)=>a+b,0)/engage.length||0).toFixed(1);

  document.getElementById("focusAvg").innerText=avgF;
  document.getElementById("engageAvg").innerText=avgE;

  drawChart(focus);

  let moveCounts={};
  entries.forEach(e=>{
    (e.moves||[]).forEach(m=>{
      moveCounts[m]=(moveCounts[m]||0)+1;
    });
  });

  let html="";
  Object.entries(moveCounts).forEach(([m,c])=>{
    html+=`${m}: ${c}<br>`;
  });
  document.getElementById("moves").innerHTML=html;

  let insight = avgF < 3
    ? "Focus is low. Strengthen clarity or regulation."
    : avgE < 3
    ? "Engagement is low. Increase interaction."
    : "Coherence is building. Maintain your patterns.";

  document.getElementById("insight").innerText=insight;
}

function drawChart(data){
  let canvas=document.getElementById("chart");
  let ctx=canvas.getContext("2d");

  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.beginPath();
  ctx.moveTo(0,150-data[0]*25);

  data.forEach((v,i)=>{
    ctx.quadraticCurveTo(
      i*40,150-v*25,
      (i+1)*40,150-(data[i+1]||v)*25
    );
  });

  ctx.strokeStyle="#4a90e2";
  ctx.lineWidth=3;
  ctx.stroke();
}

</script>

</body>
</html>
