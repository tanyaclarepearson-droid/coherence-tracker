<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coherence</title>

<style>
body {
  font-family: -apple-system, sans-serif;
  margin: 0;
  background: linear-gradient(180deg,#eef6ff,#ffffff);
  transition: background 0.6s ease;
}

.header {
  text-align: center;
  padding: 14px;
  font-weight: 600;
  letter-spacing: 0.5px;
}

.container {
  padding: 16px;
}

.screen {
  display: none;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.4s ease;
}

.screen.active {
  display: block;
  opacity: 1;
  transform: translateY(0);
}

.card {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 16px;
  margin-bottom: 14px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.06);
}

button {
  width: 100%;
  padding: 14px;
  margin: 6px 0;
  border-radius: 16px;
  border: none;
  background: rgba(255,255,255,0.85);
  transition: all 0.25s ease;
}

button:hover {
  transform: scale(1.02);
}

button.selected {
  transform: scale(1.04);
  color: white;
}

.red { background: linear-gradient(135deg,#ff6b6b,#ff8e8e); }
.blue { background: linear-gradient(135deg,#4a90e2,#6fb3ff); }
.green { background: linear-gradient(135deg,#6fcf97,#8ee3b5); }

.primary {
  background: linear-gradient(135deg,#6fcf97,#4caf7d);
  color: white;
}

.metric {
  font-size: 30px;
  font-weight: 600;
}

canvas {
  width: 100%;
  height: 160px;
}

.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  background: white;
}

.nav button {
  flex: 1;
  border-radius: 0;
}

</style>
</head>

<body>

<div class="header">Coherence</div>

<div class="container">

<!-- CAPTURE -->
<div id="capture" class="screen active">

<div class="card">
<h3>Energy</h3>
<button onclick="select(this,'energy','Pulled','red')" class="red">Pulled</button>
<button onclick="select(this,'energy','Mixed','blue')" class="blue">Mixed</button>
<button onclick="select(this,'energy','Held','green')" class="green">Held</button>
</div>

<div class="card">
<h3>Focus</h3>
<button onclick="select(this,'focus','2')">Low</button>
<button onclick="select(this,'focus','3')">Medium</button>
<button onclick="select(this,'focus','5')">High</button>
</div>

<button class="primary" onclick="saveEntry()">Save</button>

</div>

<!-- DASHBOARD -->
<div id="dashboard" class="screen">

<div class="card">
<div class="metric" id="focusAvg"></div>
Focus
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">
<b>Insight</b>
<div id="insight"></div>
</div>

</div>

</div>

<div class="nav">
<button onclick="show('capture')">Capture</button>
<button onclick="show('dashboard')">Dashboard</button>
</div>

<script>

let data={};

function show(screen){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(screen).classList.add("active");
  if(screen==="dashboard") loadDashboard();
}

function select(btn,key,val,color){
  btn.classList.add("selected");
  data[key]=val;

  if(color==="green"){
    document.body.style.background="linear-gradient(#e6fff0,#ffffff)";
  } else if(color==="red"){
    document.body.style.background="linear-gradient(#ffeaea,#ffffff)";
  } else {
    document.body.style.background="linear-gradient(#eef6ff,#ffffff)";
  }
}

function saveEntry(){
  let entries=JSON.parse(localStorage.getItem("entries")||"[]");
  entries.push({...data});
  localStorage.setItem("entries",JSON.stringify(entries));
  data={};
  alert("Saved");
}

function loadDashboard(){
  let entries=JSON.parse(localStorage.getItem("entries")||"[]");

  let focus=entries.map(e=>Number(e.focus||0));
  let avg=(focus.reduce((a,b)=>a+b,0)/focus.length||0).toFixed(1);

  document.getElementById("focusAvg").innerText=avg;

  drawChart(focus);

  let insight = avg < 3 
    ? "Focus is low → add structure or reset"
    : "Focus stable → maintain patterns";

  document.getElementById("insight").innerText=insight;
}

function drawChart(data){
  let canvas=document.getElementById("chart");
  let ctx=canvas.getContext("2d");

  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.beginPath();
  ctx.moveTo(0,150-data[0]*25);

  data.forEach((v,i)=>{
    ctx.quadraticCurveTo(
      i*50,150-v*25,
      (i+1)*50,150-(data[i+1]||v)*25
    );
  });

  ctx.strokeStyle="#4a90e2";
  ctx.lineWidth=3;
  ctx.shadowBlur=10;
  ctx.shadowColor="#4a90e2";
  ctx.stroke();
}

</script>

</body>
</html>
