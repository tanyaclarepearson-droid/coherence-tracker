<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coherence Intelligence</title>

<style>
body {
  font-family: -apple-system, sans-serif;
  margin: 0;
  padding: 16px;
  background: linear-gradient(180deg,#eef6ff,#ffffff);
  transition: background 0.4s ease;
}

h2 {
  text-align:center;
  margin:10px 0 20px;
  font-weight:600;
}

.screen { display:none; }
.active { display:block; }

.card {
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(12px);
  padding:16px;
  border-radius:20px;
  margin:12px 0;
  box-shadow: 0 6px 20px rgba(0,0,0,0.06);
}

button, select {
  width:100%;
  padding:14px;
  margin:6px 0;
  border-radius:16px;
  border:none;
  background: rgba(255,255,255,0.9);
  font-size:16px;
  transition: all 0.2s ease;
}

button:hover {
  transform: scale(1.02);
}

button.selected {
  background: linear-gradient(135deg,#4a90e2,#6fb3ff);
  color:white;
  box-shadow: 0 4px 12px rgba(74,144,226,0.4);
}

.next {
  background: linear-gradient(135deg,#6fcf97,#4caf7d);
  color:white;
}

.scale button {
  width:18%;
  display:inline-block;
}

.metric {
  font-size:28px;
  font-weight:600;
}

canvas {
  width:100%;
  height:140px;
}

</style>
</head>

<body>

<h2>Coherence Intelligence</h2>

<div id="entry" class="screen active">

<div class="card">
<h3>Energy</h3>
<button onclick="select(this,'energy','Pulled','red')">Pulled</button>
<button onclick="select(this,'energy','Mixed','blue')">Mixed</button>
<button onclick="select(this,'energy','Held','green')">Held</button>
</div>

<div class="card">
<h3>Student</h3>
<select onchange="data.student=this.value">
<option>Whole Class</option>
<option>Group 1</option>
<option>Student A</option>
<option>Student B</option>
</select>
</div>

<div class="card">
<h3>Moves</h3>
<button onclick="limitToggle(this,'moves','Language')">Language</button>
<button onclick="limitToggle(this,'moves','Breathing')">Breathing</button>
<button onclick="limitToggle(this,'moves','Clarity')">Clarity</button>
</div>

<div class="card">
<h3>Focus</h3>
<div class="scale">
<button onclick="select(this,'focus','1')">1</button>
<button onclick="select(this,'focus','2')">2</button>
<button onclick="select(this,'focus','3')">3</button>
<button onclick="select(this,'focus','4')">4</button>
<button onclick="select(this,'focus','5')">5</button>
</div>

<h3>Engagement</h3>
<div class="scale">
<button onclick="select(this,'engagement','1')">1</button>
<button onclick="select(this,'engagement','2')">2</button>
<button onclick="select(this,'engagement','3')">3</button>
<button onclick="select(this,'engagement','4')">4</button>
<button onclick="select(this,'engagement','5')">5</button>
</div>
</div>

<button class="next" onclick="saveEntry()">Save + Dashboard</button>

</div>

<div id="dashboard" class="screen">

<div class="card">
<div class="metric" id="focusAvg"></div>
Focus
</div>

<div class="card">
<div class="metric" id="engageAvg"></div>
Engagement
</div>

<div class="card">
<b>Focus Trend</b>
<canvas id="focusChart"></canvas>
</div>

<div class="card">
<b>Engagement Trend</b>
<canvas id="engageChart"></canvas>
</div>

<div class="card">
<b>Recommended Next Move</b>
<div id="rec"></div>
</div>

<button class="next" onclick="location.reload()">New Entry</button>

</div>

<script>

let data={};

function select(btn,key,val,color){
  btn.classList.add("selected");
  data[key]=val;

  if(color==="green"){
    document.body.style.background="linear-gradient(#e6fff0,#ffffff)";
  } else if(color==="red"){
    document.body.style.background="linear-gradient(#ffeaea,#ffffff)";
  } else {
    document.body.style.background="linear-gradient(#eef6ff,#ffffff)";
  }
}

function limitToggle(btn,key,val){
  if(!data[key]) data[key]=[];
  if(data[key].includes(val)){
    data[key]=data[key].filter(v=>v!==val);
    btn.classList.remove("selected");
  } else if(data[key].length<2){
    data[key].push(val);
    btn.classList.add("selected");
  }
}

function saveEntry(){
  let entries=JSON.parse(localStorage.getItem("entries")||"[]");
  entries.push({...data});
  localStorage.setItem("entries",JSON.stringify(entries));
  loadDashboard();
}

function loadDashboard(){
  document.getElementById("entry").classList.remove("active");
  document.getElementById("dashboard").classList.add("active");

  let entries=JSON.parse(localStorage.getItem("entries")||"[]");

  let focus=entries.map(e=>Number(e.focus||0));
  let engage=entries.map(e=>Number(e.engagement||0));

  let avgF=(focus.reduce((a,b)=>a+b,0)/focus.length||0).toFixed(1);
  let avgE=(engage.reduce((a,b)=>a+b,0)/engage.length||0).toFixed(1);

  document.getElementById("focusAvg").innerText=avgF;
  document.getElementById("engageAvg").innerText=avgE;

  drawChart("focusChart",focus);
  drawChart("engageChart",engage);

  let rec="";
  if(avgF<3) rec="Add regulation or clarity before learning.";
  else if(avgE<3) rec="Increase interaction or language.";
  else rec="Maintain—coherence is strong.";

  document.getElementById("rec").innerText=rec;
}

function drawChart(id,data){
  let canvas=document.getElementById(id);
  let ctx=canvas.getContext("2d");

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.beginPath();
  ctx.moveTo(0,150-data[0]*25);

  data.forEach((v,i)=>{
    ctx.quadraticCurveTo(
      i*40,150-v*25,
      (i+1)*40,150-(data[i+1]||v)*25
    );
  });

  ctx.strokeStyle="#4a90e2";
  ctx.lineWidth=3;
  ctx.shadowBlur=8;
  ctx.shadowColor="#4a90e2";
  ctx.stroke();
}

</script>

</body>
</html>
