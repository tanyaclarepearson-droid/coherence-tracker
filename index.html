<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coherence Tracker</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: linear-gradient(to bottom,#e8f2ff,#ffffff);
}

h2 { text-align:center; }

.screen { display:none; }
.active { display:block; }

button {
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
  background:#e3ecff;
}

button.selected { background:#4a90e2; color:white; }
.next { background:#6fcf97; color:white; }

.scale button {
  width:18%;
  display:inline-block;
}

.card {
  background:white;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
}

.bar {
  height:10px;
  background:#4a90e2;
  margin:5px 0;
}

</style>
</head>

<body>

<h2>Coherence Tracker</h2>

<!-- ENTRY FLOW (same as V3) -->

<div id="screen1" class="screen active">
<h3>Energy</h3>
<button onclick="select(this,'energy','Pulled')">Pulled</button>
<button onclick="select(this,'energy','Mixed')">Mixed</button>
<button onclick="select(this,'energy','Held')">Held</button>
<button class="next" onclick="next(2)">Next</button>
</div>

<div id="screen2" class="screen">
<h3>Field</h3>
<button onclick="select(this,'field','Thready')">Thready</button>
<button onclick="select(this,'field','Settling')">Settling</button>
<button onclick="select(this,'field','Coherent')">Coherent</button>
<button onclick="select(this,'field','Vibrant')">Vibrant</button>
<button class="next" onclick="next(3)">Next</button>
</div>

<div id="screen3" class="screen">
<h3>Moves (max 2)</h3>
<button onclick="limitToggle(this,'moves','Language')">Language</button>
<button onclick="limitToggle(this,'moves','Breathing')">Breathing</button>
<button onclick="limitToggle(this,'moves','Clarity')">Clarity</button>
<button onclick="limitToggle(this,'moves','Focus')">Focus</button>
<button onclick="limitToggle(this,'moves','Interaction')">Interaction</button>
<button class="next" onclick="next(4)">Next</button>
</div>

<div id="screen4" class="screen">
<h3>Focus</h3>
<div class="scale">
<button onclick="select(this,'focus','1')">1</button>
<button onclick="select(this,'focus','2')">2</button>
<button onclick="select(this,'focus','3')">3</button>
<button onclick="select(this,'focus','4')">4</button>
<button onclick="select(this,'focus','5')">5</button>
</div>

<h3>Engagement</h3>
<div class="scale">
<button onclick="select(this,'engagement','1')">1</button>
<button onclick="select(this,'engagement','2')">2</button>
<button onclick="select(this,'engagement','3')">3</button>
<button onclick="select(this,'engagement','4')">4</button>
<button onclick="select(this,'engagement','5')">5</button>
</div>

<button class="next" onclick="next(5)">Next</button>
</div>

<div id="screen5" class="screen">
<h3>Clarity</h3>
<button onclick="select(this,'student','Yes')">Yes</button>
<button onclick="select(this,'student','Partial')">Partial</button>
<button onclick="select(this,'student','No')">No</button>

<button class="next" onclick="saveEntry()">Save</button>
<button onclick="next(6)">Insights</button>
</div>

<!-- INSIGHTS SCREEN -->

<div id="screen6" class="screen">
<h3>Insights</h3>

<div id="summary"></div>

<h4>Energy Distribution</h4>
<div id="energyChart"></div>

<h4>Average Scores</h4>
<div id="averages"></div>

<h4>Most Used Moves</h4>
<div id="moves"></div>

<h4>Pattern Insight</h4>
<div id="insightText"></div>

<button class="next" onclick="location.reload()">New Entry</button>
</div>

<script>
let data={};

function select(btn,key,val){
  btn.classList.add("selected");
  data[key]=val;
}

function limitToggle(btn,key,val){
  if(!data[key]) data[key]=[];
  if(data[key].includes(val)){
    data[key]=data[key].filter(v=>v!==val);
    btn.classList.remove("selected");
  } else {
    if(data[key].length<2){
      data[key].push(val);
      btn.classList.add("selected");
    }
  }
}

function next(n){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("screen"+n).classList.add("active");
  if(n===6) loadInsights();
}

function saveEntry(){
  let entries=JSON.parse(localStorage.getItem("entries")||"[]");
  entries.push({...data});
  localStorage.setItem("entries",JSON.stringify(entries));
  next(6);
}

function loadInsights(){
  let entries=JSON.parse(localStorage.getItem("entries")||"[]");

  let pulled=0, mixed=0, held=0;
  let focusSum=0, engageSum=0;
  let moveCounts={};

  entries.forEach(e=>{
    if(e.energy==="Pulled") pulled++;
    if(e.energy==="Mixed") mixed++;
    if(e.energy==="Held") held++;

    focusSum+=Number(e.focus||0);
    engageSum+=Number(e.engagement||0);

    (e.moves||[]).forEach(m=>{
      moveCounts[m]=(moveCounts[m]||0)+1;
    });
  });

  let total=entries.length||1;

  document.getElementById("energyChart").innerHTML=`
    Pulled <div class="bar" style="width:${pulled*20}px"></div>
    Mixed <div class="bar" style="width:${mixed*20}px"></div>
    Held <div class="bar" style="width:${held*20}px"></div>
  `;

  document.getElementById("averages").innerHTML=`
    Focus Avg: ${(focusSum/total).toFixed(1)}<br>
    Engagement Avg: ${(engageSum/total).toFixed(1)}
  `;

  let movesHTML="";
  Object.entries(moveCounts).forEach(([m,c])=>{
    movesHTML+=`${m}: ${c}<br>`;
  });
  document.getElementById("moves").innerHTML=movesHTML;

  let insight="";
  if(held>pulled){
    insight="Energy is more often held—coherence is building.";
  } else {
    insight="Energy is often pulled—focus on resets and clarity.";
  }

  document.getElementById("insightText").innerText=insight;
}
</script>

</body>
</html>
